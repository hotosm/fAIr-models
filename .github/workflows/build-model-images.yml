name: Build Model Images

on:
  pull_request:
    paths: ["models/**"]
  push:
    branches: [master]
    paths: ["models/**"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.models.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch base ref
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.event.pull_request.base.ref }}
      - uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv add pystac
      - id: models
        run: echo "matrix=$(uv run python .github/scripts/detect_models.py)" >> $GITHUB_OUTPUT
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}

  build:
    needs: detect
    if: needs.detect.outputs.matrix != '{"include":[]}'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/fair-models/${{ matrix.name }}
          tags: |
            type=ref,event=pr,prefix=pr-
            type=raw,value=v${{ matrix.version }},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.path }}/Dockerfile
          target: test
          load: true
          tags: ${{ matrix.name }}:test
          cache-from: type=gha,scope=${{ matrix.name }}

      - name: Run step tests
        run: |
          docker run --rm --entrypoint "" \
            -e FAIR_FORCE_CPU=1 \
            "${{ matrix.name }}:test" \
            python -m pytest models/${{ matrix.name }}/tests/ -v --tb=short

      - name: Run integration test
        run: |
          docker run --rm --entrypoint "" \
            -e FAIR_FORCE_CPU=1 \
            "${{ matrix.name }}:test" \
            python -m pytest models/test_integration.py -v --tb=short -m slow --model-dir=models/${{ matrix.name }}

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.path }}/Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
