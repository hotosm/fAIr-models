name: Build Model Images

on:
  pull_request:
    paths:
      - "models/**"
      - ".github/workflows/build-model-images.yml"
      - ".github/scripts/detect_models.py"
  push:
    branches: [ master ]
    paths:
      - "models/**"
      - ".github/workflows/build-model-images.yml"
      - ".github/scripts/detect_models.py"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.models.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch base ref
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.event.pull_request.base.ref }}
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv add pystac
      - id: models
        run: echo "matrix=$(uv run python .github/scripts/detect_models.py)" >>
          $GITHUB_OUTPUT
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}

  build:
    needs: detect
    if: needs.detect.outputs.matrix != '{"include":[]}'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/fair-models/${{
            matrix.name }}
          tags: |
            type=ref,event=pr,prefix=pr-
            type=raw,value=v${{ matrix.version }},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.path }}/Dockerfile
          target: test
          load: true
          tags: ${{ matrix.name }}:test
          cache-from: type=gha,scope=${{ matrix.name }}

      - name: Run step tests with coverage gate
        run: |
          docker run --rm --entrypoint "" \
            -e FAIR_FORCE_CPU=1 \
            -v "$PWD:/workspace" \
            -w /workspace \
            "${{ matrix.name }}:test" \
            python -m pytest models/${{ matrix.name }}/tests/ -v --tb=short --model-dir=models/${{ matrix.name }} --cov=models/${{ matrix.name }} --cov-report=term-missing --cov-report=xml:coverage-model.xml --cov-fail-under=90

      - name: Upload model coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-model.xml
          flags: ${{ matrix.name }}
          name: ${{ matrix.name }}-coverage

      - name: Run integration test
        run: |
          docker run --rm --entrypoint "" \
            -e FAIR_FORCE_CPU=1 \
            "${{ matrix.name }}:test" \
            python -m pytest models/test_integration.py -v --tb=short -m slow --model-dir=models/${{ matrix.name }}

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.path }}/Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - uses: docker/metadata-action@v5
        id: inference-meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/fair-models/${{
            matrix.name }}
          tags: |
            type=ref,event=pr,prefix=pr-,suffix=-inference
            type=raw,value=v${{ matrix.version }}-inference,enable={{is_default_branch}}
            type=raw,value=latest-inference,enable={{is_default_branch}}

      - name: Build inference image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.path }}/Dockerfile
          target: inference
          load: true
          tags: ${{ matrix.name }}:inference
          cache-from: type=gha,scope=${{ matrix.name }}-inference

      - name: Smoke test inference image
        run: |
          docker run --rm -d --name "${{ matrix.name }}-smoke" \
            -e MODEL_MODULE="models.${{ matrix.name }}.pipeline" \
            -p 18080:8080 \
            "${{ matrix.name }}:inference"
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/health >/dev/null; then
              docker rm -f "${{ matrix.name }}-smoke"
              exit 0
            fi
            sleep 1
          done
          docker logs "${{ matrix.name }}-smoke" || true
          docker rm -f "${{ matrix.name }}-smoke"
          exit 1

      - name: Push inference image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.path }}/Dockerfile
          target: inference
          push: true
          tags: ${{ steps.inference-meta.outputs.tags }}
          labels: ${{ steps.inference-meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}-inference
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}-inference
