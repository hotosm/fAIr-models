name: build & integration of zenml workflow
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
defaults:
  run:
    shell: bash
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  example:
    name: example workflow
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --group example --group local
      - name: Start ZenML server
        run: |
          uv run zenml init
          uv run zenml up --blocking &
          sleep 10
          uv run zenml status
      - name: Run example workflow
        run: uv run python examples/segmentation/run.py all
      - name: Verify artifacts
        run: |
          test -d stac_catalog || { echo "STAC catalog not created"; exit 1; }
          test -f stac_catalog/base-models/unet-segmentation/unet-segmentation.json || { echo "Base model not registered"; exit 1; }
          test -f stac_catalog/datasets/buildings-banepa/buildings-banepa.json || { echo "Dataset not registered"; exit 1; }
          test -n "$(ls -A stac_catalog/local-models/ 2>/dev/null)" || { echo "Local model not published"; exit 1; }
          test -d artifacts || { echo "Artifacts directory not created"; exit 1; }
          echo "All workflow outputs verified: STAC catalog + artifacts"
