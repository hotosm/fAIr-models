name: build & integration of zenml workflow
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
defaults:
  run:
    shell: bash
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  example:
    name: example workflow
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --group example --group local
      - name: Start ZenML server
        run: |
          uv run zenml init
          uv run zenml up --blocking &
          sleep 10
          uv run zenml status
      - name: Generate derived labels
        run: |
          uv run python scripts/convert_segmentation_to_classification.py
          uv run python scripts/convert_segmentation_to_detection.py
      - name: Run segmentation example
        run: uv run python examples/segmentation/run.py all
      - name: Run classification example
        run: uv run python examples/classification/run.py all
      - name: Run detection example
        run: uv run python examples/detection/run.py all
      - name: Verify artifacts
        run: |
          test -d stac_catalog || { echo "STAC catalog not created"; exit 1; }
          for model in unet-segmentation resnet18-classification yolo11n-detection; do
            test -f "stac_catalog/base-models/$model/$model.json" || { echo "Base model $model not registered"; exit 1; }
          done
          for dataset in buildings-banepa-segmentation buildings-banepa-classification buildings-banepa-detection; do
            test -f "stac_catalog/datasets/$dataset/$dataset.json" || { echo "Dataset $dataset not registered"; exit 1; }
          done
          test -n "$(ls -A stac_catalog/local-models/ 2>/dev/null)" || { echo "No local models published"; exit 1; }
          test -d artifacts || { echo "Artifacts directory not created"; exit 1; }
          echo "All workflow outputs verified: STAC catalog + artifacts"
