name: docs

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "fair/**"
      - "fair/schemas/**"
      - "CHANGELOG.md"
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "fair/**"
      - "fair/schemas/**"
      - "CHANGELOG.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5

      - name: Install docs dependencies
        run: uv sync --group docs

      - name: Copy schemas to docs
        run: mkdir -p docs/schemas && cp -r fair/schemas/v* docs/schemas/

      - name: Build docs
        run: uv run zensical build

      - name: Upload artifact
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
