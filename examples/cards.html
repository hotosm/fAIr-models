<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>fAIr STAC Cards</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; padding: 1rem; }
  h1 { font-size: 1.4rem; margin-bottom: 1rem; }
  h2 { font-size: 1.1rem; margin: 1rem 0 0.5rem; border-bottom: 1px solid #ddd; padding-bottom: 0.25rem; }
  h3 { font-size: 0.95rem; margin: 0.75rem 0 0.3rem; }

  .controls { margin-bottom: 1rem; display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
  .controls label { font-weight: 600; }
  .controls input { padding: 0.3rem 0.5rem; border: 1px solid #ccc; border-radius: 3px; font-size: 0.9rem; width: 350px; }
  .controls button { padding: 0.3rem 0.8rem; border: 1px solid #888; border-radius: 3px; cursor: pointer; background: #fff; font-size: 0.9rem; }
  .controls button:hover { background: #eee; }
  .controls select { padding: 0.3rem; border: 1px solid #ccc; border-radius: 3px; font-size: 0.9rem; }

  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 900px) { .cards { grid-template-columns: 1fr; } }

  .card { background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 1rem; }
  .card-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.5rem; }
  .card-header .badge { font-size: 0.75rem; padding: 0.15rem 0.5rem; border-radius: 3px; background: #e8f0fe; color: #1a73e8; }
  .card-header .badge.dataset { background: #e6f4ea; color: #137333; }
  .card-header .badge.local { background: #fef7e0; color: #b06000; }
  .card-header .badge.deprecated { background: #fce8e6; color: #c5221f; }

  .desc { color: #555; font-size: 0.9rem; margin-bottom: 0.5rem; }

  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-bottom: 0.5rem; }
  th, td { text-align: left; padding: 0.25rem 0.5rem; border-bottom: 1px solid #eee; }
  th { font-weight: 600; width: 40%; color: #555; }

  .tag { display: inline-block; font-size: 0.75rem; padding: 0.1rem 0.4rem; margin: 0.1rem; border-radius: 2px; background: #f0f0f0; }

  .link-list { list-style: none; font-size: 0.85rem; }
  .link-list li { margin: 0.2rem 0; }
  .link-list a { color: #1a73e8; text-decoration: none; }
  .link-list a:hover { text-decoration: underline; }

  .asset-table td:first-child { font-weight: 600; }
  .mono { font-family: "SF Mono", Monaco, Consolas, monospace; font-size: 0.8rem; word-break: break-all; }

  .metrics-table td:nth-child(2) { font-family: "SF Mono", Monaco, Consolas, monospace; }

  .empty { color: #999; font-style: italic; font-size: 0.9rem; padding: 2rem; text-align: center; }
  .error { color: #c5221f; font-size: 0.9rem; padding: 1rem; }

  #status { font-size: 0.85rem; color: #666; margin-left: 0.5rem; }
</style>
</head>
<body>

<h1>fAIr Model &amp; Dataset Cards</h1>

<div class="controls">
  <label for="api-url">STAC API:</label>
  <input id="api-url" value="https://stac.fair.krschap.tech/stac">
  <select id="collection-select">
    <option value="all">All Collections</option>
    <option value="base-models">Base Models</option>
    <option value="local-models">Local Models</option>
    <option value="datasets">Datasets</option>
  </select>
  <button onclick="load()">Load</button>
  <span id="status"></span>
</div>

<div id="cards-container" class="cards">
  <div class="empty">Enter a STAC API URL and click Load.</div>
</div>

<script>
const $ = (id) => document.getElementById(id);

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
  return r.json();
}

async function load() {
  const base = $("api-url").value.replace(/\/+$/, "");
  const col = $("collection-select").value;
  const container = $("cards-container");
  const status = $("status");

  container.innerHTML = "";
  status.textContent = "Loading...";

  try {
    const collections = col === "all"
      ? ["base-models", "local-models", "datasets"]
      : [col];

    const allItems = [];
    for (const c of collections) {
      const data = await fetchJSON(`${base}/collections/${c}/items?limit=50`);
      for (const f of (data.features || [])) {
        f._collection = c;
        allItems.push(f);
      }
    }

    if (allItems.length === 0) {
      container.innerHTML = '<div class="empty">No items found.</div>';
      status.textContent = "";
      return;
    }

    for (const item of allItems) {
      container.appendChild(renderCard(item));
    }
    status.textContent = `${allItems.length} item(s)`;
  } catch (e) {
    container.innerHTML = `<div class="error">Error: ${esc(e.message)}</div>`;
    status.textContent = "Failed";
  }
}

function renderCard(item) {
  const col = item._collection || item.collection || "unknown";
  const p = item.properties || {};
  const isModel = col === "base-models" || col === "local-models";
  const isDataset = col === "datasets";
  const isLocal = col === "local-models";

  const card = document.createElement("div");
  card.className = "card";

  let badgeClass = isDataset ? "dataset" : isLocal ? "local" : "";
  if (p.deprecated) badgeClass = "deprecated";
  const badgeLabel = p.deprecated ? "deprecated" : col;

  let html = `<div class="card-header">
    <strong>${esc(p.title || p["mlm:name"] || item.id)}</strong>
    <span class="badge ${badgeClass}">${esc(badgeLabel)}</span>
  </div>`;

  if (p.description) {
    html += `<div class="desc">${esc(p.description)}</div>`;
  }

  if (isModel) {
    html += renderModelCard(item, p, isLocal);
  } else if (isDataset) {
    html += renderDatasetCard(item, p);
  }

  card.innerHTML = html;
  return card;
}

function renderModelCard(item, p, isLocal) {
  let html = "";

  html += "<h2>Overview</h2><table>";
  html += row("Architecture", p["mlm:architecture"]);
  html += row("Framework", `${p["mlm:framework"] || ""} ${p["mlm:framework_version"] || ""}`.trim());
  html += row("Tasks", (p["mlm:tasks"] || []).join(", "));
  html += row("License", p.license);
  html += row("Pretrained", p["mlm:pretrained"] ? "Yes" : "No");
  if (p["mlm:pretrained_source"]) html += row("Pretrained Source", linkOrText(p["mlm:pretrained_source"]));
  if (p["mlm:accelerator"]) html += row("Accelerator", `${p["mlm:accelerator"]} x${p["mlm:accelerator_count"] || 1}`);
  html += row("Version", p.version);
  if (isLocal && p["fair:user_id"]) html += row("User ID", p["fair:user_id"]);
  html += "</table>";

  if (isLocal) {
    html += "<h2>Provenance</h2><table>";
    if (p["fair:base_model_id"]) html += row("Base Model ID", p["fair:base_model_id"]);
    if (p["fair:dataset_id"]) html += row("Dataset ID", p["fair:dataset_id"]);
    if (p["fair:labeled_chip_count"] != null) html += row("Training Chips", p["fair:labeled_chip_count"]);

    const derivedLinks = (item.links || []).filter(l => l.rel === "derived_from");
    for (const dl of derivedLinks) {
      const label = dl["mlm:name"] ? `Base Model: ${dl["mlm:name"]}` : (dl.title || "Dataset");
      html += row(label, `<a href="${esc(dl.href)}" target="_blank">${esc(dl.href)}</a>`);
    }
    html += "</table>";
  }

  const inputSpec = (p["mlm:input"] || [])[0];
  const outputSpec = (p["mlm:output"] || [])[0];

  if (inputSpec) {
    html += "<h2>Input</h2><table>";
    html += row("Name", inputSpec.name);
    const shape = inputSpec.input?.shape;
    if (shape) html += row("Shape", `[${shape.join(", ")}]`);
    html += row("Data Type", inputSpec.input?.data_type);
    html += row("Bands", (inputSpec.bands || []).map(b => b.name).join(", "));
    if (inputSpec.pre_processing_function) {
      html += row("Preprocessing", `<span class="mono">${esc(inputSpec.pre_processing_function.expression || "")}</span>`);
    }
    html += "</table>";
  }

  if (outputSpec) {
    html += "<h2>Output</h2><table>";
    html += row("Name", outputSpec.name);
    const shape = outputSpec.result?.shape;
    if (shape) html += row("Shape", `[${shape.join(", ")}]`);
    html += row("Data Type", outputSpec.result?.data_type);
    if (outputSpec.post_processing_function) {
      html += row("Postprocessing", `<span class="mono">${esc(outputSpec.post_processing_function.expression || "")}</span>`);
    }
    html += "</table>";

    const classes = outputSpec["classification:classes"];
    if (classes && classes.length) {
      html += "<h3>Classes</h3><table><tr><th>Name</th><th>Value</th><th>Description</th></tr>";
      for (const c of classes) {
        html += `<tr><td>${esc(c.name)}</td><td>${c.value}</td><td>${esc(c.description || "")}</td></tr>`;
      }
      html += "</table>";
    }
  }

  const hp = p["mlm:hyperparameters"];
  if (hp && Object.keys(hp).length) {
    html += "<h2>Hyperparameters</h2><table>";
    for (const [k, v] of Object.entries(hp)) {
      html += row(k, typeof v === "object" ? JSON.stringify(v) : String(v));
    }
    html += "</table>";
  }

  const metricsSpec = p["fair:metrics_spec"];
  const hasMetricValues = Object.keys(p).some(k => k.startsWith("fair:") && k !== "fair:metrics_spec" && k !== "fair:user_id" && k !== "fair:base_model_id" && k !== "fair:dataset_id" && k !== "fair:labeled_chip_count" && k !== "fair:training_started_at" && k !== "fair:training_ended_at" && k !== "fair:training_duration_seconds");

  if (metricsSpec && metricsSpec.length) {
    html += "<h2>Metrics</h2>";
    if (hasMetricValues) {
      html += '<table class="metrics-table"><tr><th>Metric</th><th>Value</th><th>Description</th></tr>';
      for (const m of metricsSpec) {
        const val = p[m.key];
        const display = val !== undefined
          ? (typeof val === "object" ? JSON.stringify(val) : String(val))
          : "<em>not measured</em>";
        html += `<tr><td>${esc(m.name)}</td><td>${display}</td><td>${esc(m.description || "")}</td></tr>`;
      }
      html += "</table>";
    } else {
      html += '<table><tr><th>Metric</th><th>Description</th></tr>';
      for (const m of metricsSpec) {
        html += `<tr><td>${esc(m.name)}</td><td>${esc(m.description || "")}</td></tr>`;
      }
      html += "</table>";
      if (isLocal) {
        html += '<div class="desc">No metric values recorded for this version.</div>';
      }
    }
  }

  if (isLocal) {
    const hasTraining = p["fair:training_started_at"] || p["fair:training_duration_seconds"] != null;
    if (hasTraining) {
      html += "<h2>Training</h2><table>";
      if (p["fair:training_started_at"]) html += row("Started", p["fair:training_started_at"]);
      if (p["fair:training_ended_at"]) html += row("Ended", p["fair:training_ended_at"]);
      if (p["fair:training_duration_seconds"] != null) html += row("Duration", formatDuration(p["fair:training_duration_seconds"]));
      html += "</table>";
    }
  }

  html += renderAssets(item.assets);
  html += renderKeywords(p.keywords);
  html += renderLinks(item.links, isLocal);
  html += renderGeometry(item);

  return html;
}

function renderDatasetCard(item, p) {
  let html = "";

  html += "<h2>Overview</h2><table>";
  html += row("Label Type", p["label:type"]);
  html += row("Label Tasks", (p["label:tasks"] || []).join(", "));
  html += row("Version", p.version);
  html += row("License", p.license);
  if (p["label:description"]) html += row("Label Description", p["label:description"]);
  if (p["label:methods"]) html += row("Annotation Methods", (p["label:methods"] || []).join(", "));
  if (p["fair:chip_count"] != null) html += row("Chip Count", p["fair:chip_count"]);
  if (p["fair:source_imagery"]) html += row("Source Imagery", linkOrText(p["fair:source_imagery"]));
  if (p["fair:user_id"]) html += row("User ID", p["fair:user_id"]);
  html += "</table>";

  const providers = p.providers;
  if (providers && providers.length) {
    html += "<h2>Providers</h2><table><tr><th>Name</th><th>Roles</th><th>URL</th></tr>";
    for (const prov of providers) {
      const url = prov.url ? `<a href="${esc(prov.url)}" target="_blank">${esc(prov.url)}</a>` : "";
      html += `<tr><td>${esc(prov.name)}</td><td>${esc((prov.roles || []).join(", "))}</td><td>${url}</td></tr>`;
    }
    html += "</table>";
  }

  const classes = p["label:classes"];
  if (classes && classes.length) {
    html += "<h3>Label Classes</h3><table><tr><th>Name</th><th>Details</th></tr>";
    for (const c of classes) {
      const details = c.classes ? c.classes.join(", ") : (c.description || "");
      html += `<tr><td>${esc(c.name)}</td><td>${esc(details)}</td></tr>`;
    }
    html += "</table>";
  }

  html += renderAssets(item.assets);
  html += renderKeywords(p.keywords);
  html += renderLinks(item.links, false);
  html += renderGeometry(item);

  return html;
}

function renderAssets(assets) {
  if (!assets || !Object.keys(assets).length) return "";
  let html = '<h2>Assets</h2><table class="asset-table">';
  for (const [key, asset] of Object.entries(assets)) {
    const title = asset.title || key;
    const href = asset.href || "";
    const roles = (asset.roles || []).join(", ");
    const extras = [];
    if (asset["mlm:artifact_type"]) extras.push(`artifact: ${asset["mlm:artifact_type"]}`);
    if (asset["mlm:entrypoint"]) extras.push(`entrypoint: ${asset["mlm:entrypoint"]}`);
    if (asset["zenml:artifact_version_id"]) extras.push(`zenml: ${asset["zenml:artifact_version_id"]}`);
    html += `<tr>
      <td>${esc(title)}</td>
      <td>
        <span class="mono">${esc(truncate(href, 80))}</span><br>
        <small>${esc(asset.type || "")} | ${esc(roles)}</small>
        ${extras.length ? "<br><small>" + extras.map(esc).join(" | ") + "</small>" : ""}
      </td>
    </tr>`;
  }
  html += "</table>";
  return html;
}

function renderKeywords(keywords) {
  if (!keywords || !keywords.length) return "";
  let html = "<h2>Tags</h2><div>";
  for (const kw of keywords) {
    html += `<span class="tag">${esc(kw)}</span>`;
  }
  html += "</div>";
  return html;
}

function renderLinks(links, isLocal) {
  if (!links || !links.length) return "";
  const relevant = links.filter(l =>
    ["license", "cite-as", "latest-version", "predecessor-version", "successor-version", "source", "derived_from"].includes(l.rel)
  );
  if (!relevant.length) return "";
  let html = '<h2>Links</h2><ul class="link-list">';
  for (const l of relevant) {
    const label = l.title || l.rel;
    html += `<li><strong>${esc(l.rel)}</strong>: <a href="${esc(l.href)}" target="_blank">${esc(label)}</a></li>`;
  }
  html += "</ul>";
  return html;
}

function renderGeometry(item) {
  if (!item.bbox) return "";
  const [w, s, e, n] = item.bbox;
  let html = "<h2>Spatial Extent</h2><table>";
  html += row("Bounding Box", `${w.toFixed(4)}, ${s.toFixed(4)} to ${e.toFixed(4)}, ${n.toFixed(4)}`);
  html += "</table>";
  return html;
}

function row(label, value) {
  if (value === undefined || value === null || value === "") return "";
  return `<tr><th>${esc(String(label))}</th><td>${typeof value === "string" && value.includes("<") ? value : esc(String(value))}</td></tr>`;
}

function linkOrText(s) {
  if (typeof s === "string" && (s.startsWith("http://") || s.startsWith("https://"))) {
    return `<a href="${esc(s)}" target="_blank">${esc(truncate(s, 60))}</a>`;
  }
  return esc(String(s));
}

function truncate(s, n) {
  return s.length > n ? s.slice(0, n) + "..." : s;
}

function formatDuration(seconds) {
  if (seconds < 60) return `${seconds.toFixed(1)}s`;
  if (seconds < 3600) return `${Math.floor(seconds / 60)}m ${Math.floor(seconds % 60)}s`;
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  return `${h}h ${m}m`;
}
</script>
</body>
</html>
