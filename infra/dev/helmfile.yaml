repositories:
  - name: eoapi
    url: https://devseed.com/eoapi-k8s/
  - name: community-charts
    url: https://community-charts.github.io/helm-charts
  - name: minio
    url: https://charts.min.io/
  - name: nvdp
    url: https://nvidia.github.io/k8s-device-plugin
  - name: zenml-ecr
    url: public.ecr.aws/zenml
    oci: true

helmDefaults:
  wait: true
  createNamespace: true

releases:
  - name: minio
    namespace: fair
    chart: minio/minio
    timeout: 300
    values:
      - minio/values.yaml

  - name: stac
    namespace: fair
    chart: eoapi/eoapi
    wait: false
    timeout: 600
    needs:
      - fair/minio
    values:
      - stac/values.yaml

  - name: mlflow
    namespace: fair
    chart: community-charts/mlflow
    timeout: 300
    needs:
      - fair/minio
    values:
      - mlflow/values.yaml

  - name: zenml
    namespace: fair
    chart: zenml-ecr/zenml
    version: 0.93.3
    timeout: 480
    needs:
      - fair/minio
    values:
      - zenml/values.yaml

  - name: nvidia-device-plugin
    namespace: nvidia
    chart: nvdp/nvidia-device-plugin
    timeout: 300
    values:
      - runtimeClassName: nvidia
        deviceDiscoveryStrategy: nvml
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
