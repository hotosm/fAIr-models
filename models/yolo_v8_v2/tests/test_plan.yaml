tests:
  - id: import_smoke
    description: Verify critical runtime imports work inside container
    checks:
      - import osgeo.gdal
      - import cv2
      - import ultralytics
      - import hot_fair_utilities

  - id: dataset_layout
    description: Verify required dataset folders/files are present
    required_paths:
      - input/
      - input/labels.geojson
      - prediction/input/
    required_image_patterns:
      - "*.png"
      - "*.tif"
      - "*.tiff"

  - id: preprocess_and_format
    description: Run preprocess and yolo_format and validate yolo_dataset.yaml creation
    expected_outputs:
      - preprocessed_test/
      - yolo_test/yolo_dataset.yaml

  - id: train_smoke
    description: Run 2-epoch training and validate best checkpoint path
    expected_outputs:
      - yolo_test/checkpoints/**/weights/best.pt

  - id: inference_smoke
    description: Run prediction using trained checkpoint and validate georeferenced tif outputs
    expected_outputs:
      - prediction/output_test/*.tif

  - id: polygonize_smoke
    description: Polygonize prediction masks and validate GeoJSON output
    expected_outputs:
      - prediction/output_test/prediction.geojson
